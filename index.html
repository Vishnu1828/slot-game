<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Slot Game</title>
    <!-- Start fetching the asset manifest in parallel with the JS bundle download. -->
    <link rel="preload" as="fetch" href="/assets/manifest.json" crossorigin="anonymous" />
    <style>
      /* Instant splash: paints at first HTML parse (0ms) and covers the whole gap while the JS
         bundle downloads/parses and Pixi + the first image load. Removed by Scene.tsx once the
         loading-screen image is on screen. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0b12;
        transition: opacity 0.25s ease;
      }
      #app-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-top-color: #ffd21e;
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash"><div class="spinner"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
